<!DOCTYPE html><html lang="en"><head>
    <meta charset="utf-8">
    <title>Fragments UI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <script type="module" src="/fragments-ui.0f77c784.js"></script>
  </head>
  <body>
    <h1>Fragments UI</h1>

    <nav>
      <button id="login">Login</button>
      <button id="logout">Logout</button>
    </nav>

    <section hidden="" id="user">
      <h2>Welcome <span class="username"></span>!</h2>
      <p><strong>Status:</strong> <span id="auth-status">Logged in</span></p>
    </section>

    <section hidden="" id="create-fragment">
      <h2>Create Fragment</h2>

      <label for="fragment-type">Fragment Type</label>
      <select id="fragment-type">
        <option value="application/json">application/json</option>
        <option value="text/markdown">text/markdown</option>
      </select>

      <label for="fragment-content">Fragment Content</label>
      <textarea id="fragment-content" rows="8" placeholder="For JSON: {&quot;name&quot;:&quot;Harshita&quot;}
For Markdown: # Hello Harshita"></textarea>

      <button id="submit-fragment">Create Fragment</button>
      <p id="create-result"></p>
    </section>

    <section hidden="" id="fragments-list-section">
      <h2>Your Fragments</h2>
      <button id="refresh-fragments">Refresh Fragments</button>
      <ul id="fragments-list"></ul>
    </section>
  
</body></html>
